<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>メンバー別走行距離</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="passwordGate" class="password-gate">
    <div class="password-box">
      <h2>メンバー別走行距離</h2>
      <p>参加するには合言葉を入力してください</p>
      <input type="password" id="passwordInput" placeholder="合言葉">
      <button id="passwordSubmit">入る</button>
      <p id="passwordError" class="password-error">合言葉が違います</p>
    </div>
  </div>

  <header>
    <h1>🏃 メンバー別走行距離</h1>
    <div class="header-controls">
      <div class="month-nav">
        <button id="prevMonth">◀</button>
        <span id="currentMonth"></span>
        <button id="nextMonth">▶</button>
      </div>
      <div class="team-filter">
        <button class="filter-btn active" data-team="all">全て</button>
        <button class="filter-btn" data-team="3SHINE">3SHINE</button>
        <button class="filter-btn" data-team="SKY3.5">SKY3.5</button>
        <button class="filter-btn" data-team="Be4">Be4</button>
        <button class="filter-btn" data-team="元リバティー">元リバティー</button>
        <button class="filter-btn" data-team="リバティースタッフ">リバティースタッフ</button>
      </div>
      <button id="settingsBtn" class="icon-btn" title="設定">⚙️</button>
    </div>
  </header>

  <div id="loginBanner" class="login-banner" style="display:none">
    <span>Stravaでログインしてランキングに参加しよう！</span>
    <button id="loginBtn">Stravaでログイン</button>
  </div>

  <div class="table-wrapper">
    <table id="rankingTable">
      <thead>
        <tr>
          <th>#</th>
          <th class="sortable tc" data-col="nickname">ニックネーム</th>
          <th class="sortable tc" data-col="strava_name">Stravaアカウント名</th>
          <th class="sortable" data-col="team">チーム</th>
          <th class="sortable num active" data-col="run_distance_km">ランニング(km) ▼</th>
          <th class="sortable num" data-col="ride_distance_km">自転車(km)</th>
          <th class="sortable num" data-col="swim_distance_m">水泳(m)</th>
          <th class="sortable num" data-col="elevation_gain_m">獲得標高(m)</th>
          <th class="sortable num" data-col="relative_effort">心拍負荷</th>
          <th class="sortable tc" data-col="full_marathon_best">フルマラソンベスト</th>
          <th class="sortable tc" data-col="half_marathon_best">ハーフマラソンベスト</th>
          <th>参加予定レース</th>
          <th>コメント</th>
        </tr>
      </thead>
      <tbody id="rankingBody">
        <tr><td colspan="13" class="loading">読み込み中...</td></tr>
      </tbody>
    </table>
  </div>

  <div class="chat-section">
    <h2 id="chatTitle">💬 掲示板</h2>
    <div id="chatMessages" class="chat-messages"></div>
    <div id="chatInputRow" class="chat-input-row" style="display:none">
      <input type="text" id="chatText" maxlength="300" placeholder="コメントを書く（今月もよろしく！など）">
      <button id="chatSend">送信</button>
    </div>
    <p id="chatLoginNote" class="chat-login-note" style="display:none">投稿するにはStravaでログインしてください</p>
  </div>

  <!-- 詳細モーダル -->
  <div id="detailModal" class="modal-overlay">
    <div class="modal">
      <button id="modalClose" class="modal-close">✕</button>
      <h2 id="modalTitle"></h2>
      <div id="detailSummary"></div>
      <div class="tabs">
        <button class="tab-btn active" data-type="run">ランニング</button>
        <button class="tab-btn" data-type="ride">自転車</button>
        <button class="tab-btn" data-type="swim">水泳</button>
      </div>
      <div id="chartTooltip" class="chart-tooltip"></div>
      <div id="detailChart" class="chart-container"></div>
    </div>
  </div>

  <div id="rateLimitIndicator" class="rate-limit-indicator" title="Strava APIの本日の使用回数（目安）"></div>

  <script src="app.js"></script>
</body>
</html>
